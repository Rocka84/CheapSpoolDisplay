name: Build and Deploy Web Installer

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build Firmware
        run: pio run -e esp32dev

      - name: Prepare Web Deployment Folder
        run: |
          # Create a deployment directory
          mkdir -p public
          
          # Copy Web Tools frontend
          cp web/index.html public/
          cp web/manifest.json public/
          
          # Copy compiled binaries into the public folder
          cp .pio/build/esp32dev/bootloader.bin public/
          cp .pio/build/esp32dev/partitions.bin public/
          cp .pio/build/esp32dev/firmware.bin public/
          
          # Modify the manifest.json path inside `public/` so the web installer looks locally instead of looking in `.pio/build`
          sed -i 's|../.pio/build/esp32dev/||g' public/manifest.json

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
